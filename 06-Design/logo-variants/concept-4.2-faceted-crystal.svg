<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Верхняя грань кристалла (треугольники-фасетки) -->
  <polygon points="16,2 24,8 8,8" fill="#9fc2e8" opacity="0.4" stroke="#9fc2e8" stroke-width="1"/>
  <!-- Средний пояс -->
  <polygon points="8,8 24,8 28,16 4,16" fill="#1e4a62" opacity="0.55" stroke="#9fc2e8" stroke-width="1"/>
  <!-- Нижняя половина (ромб) -->
  <polygon points="4,16 28,16 16,30" fill="#1e4a62" opacity="0.7" stroke="#9fc2e8" stroke-width="1.2"/>
  <!-- Внутренние грани -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#9fc2e8" stroke-width="0.6" opacity="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#9fc2e8" stroke-width="0.6" opacity="0.5"/>
  <!-- Молния по центру, вписана в 8..24 × 6..26 -->
  <path d="M18 6 L9 18 L15 18 L12 26 L23 16 L17 16 Z" fill="#f4b942"/>
</svg>