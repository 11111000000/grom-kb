name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'kb/**'
      - '.github/workflows/deploy-kb.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - run: python3 kb/convert-links.py

      - name: Build site
        working-directory: kb
        run: mkdocs build

      - name: Commit built site to gh-pages
        run: |
          cd kb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy built site to /tmp
          cp -r site /tmp/deploy-site
          cd /tmp/deploy-site
          # Init fresh repo on gh-pages branch
          git init
          git checkout -b gh-pages
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add -A
          git commit -m "Deploy MkDocs site" --allow-empty
          git push -f origin gh-pages