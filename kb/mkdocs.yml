site_name: ГРОМ38 — База знаний
site_url: https://11111000000.github.io/grom-kb/
repo_url: https://github.com/11111000000/grom-kb
repo_name: grom-kb
docs_dir: ..
site_dir: /tmp/grom-kb-site
exclude_docs: |
  .github
  .git
  .obsidian
  node_modules
  kb
  GRAPH.md
  index.html

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang: ru

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/11111000000
  mermaid:
    version: 11.4.0

extra_javascript:
  - https://unpkg.com/mermaid@11.4.0/dist/mermaid.min.js
  - javascripts/mermaid-init.js

